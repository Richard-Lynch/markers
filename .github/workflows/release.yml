name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  check:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1

      - uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run mypy src/markers/ --ignore-missing-imports

      - name: Test
        run: uv run pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v5.0.1

      - uses: astral-sh/setup-uv@v8.0.0

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [publish-testpypi]
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    steps:
      - uses: actions/checkout@v5.0.1

      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*
          generate_release_notes: true

  purge-badges:
    name: Purge badge cache
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    steps:
      - uses: actions/checkout@v5.0.1

      - name: Extract badge URLs and purge caches
        run: |
          # Extract all img.shields.io URLs from README
          urls=$(grep -oP 'https://img\.shields\.io/[^\s)]+' README.md)

          for url in $urls; do
            echo "Purging: $url"

            # Purge shields.io cache (convert image URL to purge API URL)
            purge_path=$(echo "$url" | sed 's|https://img.shields.io/|https://purge.shields.io/|')
            curl -sX POST "$purge_path" || echo "Warning: failed to purge shields.io cache for $url"

            # Purge GitHub camo cache using the ETag
            etag=$(curl -sI "$url" | grep -i etag | tr -d '"\r' | awk '{print $2}') || true
            if [ -n "$etag" ]; then
              curl -sX PURGE "https://camo.githubusercontent.com/$etag" || echo "Warning: failed to purge camo cache for $url"
            fi
          done
