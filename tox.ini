[tox]
env_list = py310, py311, py312, py313, py314, lint, typecheck
min_version = 4.0

[testenv]
description = Run tests
runner = uv-venv-runner
deps =
    pytest>=7.0
    pytest-cov>=4.0
    pydantic>=2.0
commands =
    pytest tests/ {posargs}

[testenv:lint]
description = Run linters
runner = uv-venv-runner
skip_install = true
deps =
    ruff>=0.4
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:typecheck]
description = Run type checker
runner = uv-venv-runner
deps =
    mypy>=1.10
    pydantic>=2.0
commands =
    mypy src/markers/ --ignore-missing-imports

[testenv:format]
description = Auto-format code
runner = uv-venv-runner
skip_install = true
deps =
    ruff>=0.4
commands =
    ruff format src/ tests/
    ruff check --fix src/ tests/
